<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Evidencia</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        input, select, button { width: 100%; max-width: 400px; padding: 15px; margin: 5px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        #btnCapturar { background: #28a745; }
    </style>
</head>
<body>

    <h2>📸 Captura de Evidencia</h2>
    <video id="video" autoplay playsinline></video>
    
    <button id="btnActivar">1. ENCENDER CÁMARA</button>
    <button id="btnCapturar">2. TOMAR FOTO Y ENVIAR</button>
    
    <input type="number" id="codigoPedido" placeholder="4 últimos dígitos">
    <select id="integrador">
        <option value="PedidosYa">PedidosYa</option>
        <option value="Rappi">Rappi</option>
        <option value="Uber Eats">Uber Eats</option>
    </select>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8xV4V7mD8AY-0etpGd68mOonGe6zNUoB-ZQhLnn9fUeao2xQb7jfSiroZLCtlFDy5lw/exec';
        const video = document.getElementById('video');
        const btnActivar = document.getElementById('btnActivar');
        const btnCapturar = document.getElementById('btnCapturar');

        btnActivar.addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        });

        btnCapturar.addEventListener('click', async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            
            btnCapturar.innerText = "Enviando...";
            
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    base64Data: dataUrl,
                    integrador: document.getElementById('integrador').value,
                    codigo: document.getElementById('codigoPedido').value
                })
            });
            
            alert("¡Evidencia enviada con éxito!");
            btnCapturar.innerText = "2. TOMAR FOTO Y ENVIAR";
        });
    </script>
</body>
</html>
