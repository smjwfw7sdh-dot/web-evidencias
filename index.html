<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Evidencias - Las Rastras</title>
    <style>
        body { font-family: sans-serif; background: #FDF6E2; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; border: 3px solid #502314; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; }
        .btn-int { padding: 15px; border: 2px solid #502314; background: #EEE; cursor: pointer; font-weight: bold; border-radius: 8px; }
        .selected { background: #FFB81C !important; color: #502314; }
        input, button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: 2px solid #502314; font-size: 16px; }
        .btn-reg { background: #F47321; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 Evidencias Delivery</h2>
        <input type="text" id="nPedido" placeholder="N° Pedido o Nombre">
        
        <label>Selecciona el Integrador:</label>
        <div class="grid">
            <button class="btn-int" onclick="seleccionar('PedidosYa', this)">P.Ya</button>
            <button class="btn-int" onclick="seleccionar('Rappi', this)">Rappi</button>
            <button class="btn-int" onclick="seleccionar('Uber', this)">Uber</button>
        </div>
        
        <button class="btn-reg" onclick="registrar()">REGISTRAR Y ABRIR DRIVE</button>
    </div>

    <script>
        const LINKS = {
            "PedidosYa": "https://drive.google.com/drive/folders/1OzFJMbSY6xZZXGGq--sUJVqgkLX4tT_D",
            "Rappi": "https://drive.google.com/drive/folders/1ETyJW1RC_VrJiiN4LAn4iIojfcIhem0q",
            "Uber": "https://drive.google.com/drive/folders/1RrbOrRF_niO-800gWJffv6G7gppUWgtJ"
        };
        let intSeleccionado = "";

        function seleccionar(nombre, btn) {
            intSeleccionado = nombre;
            document.querySelectorAll('.btn-int').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function registrar() {
            if (!intSeleccionado) {
                alert("¡Por favor selecciona un integrador primero!");
                return;
            }
            const pedido = document.getElementById("nPedido").value;
            if (!pedido) {
                alert("Por favor ingresa el N° de pedido");
                return;
            }
            
            // Abre la carpeta específica en una nueva pestaña
            window.open(LINKS[intSeleccionado], '_blank');
        }
    </script
