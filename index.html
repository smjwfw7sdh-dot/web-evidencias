<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencias Delivery</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; margin-bottom: 15px; }
        input, select, button { width: 100%; max-width: 400px; padding: 15px; margin: 5px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📸 Captura de Evidencia</h2>
    <video id="video" autoplay playsinline></video>
    
    <input type="number" id="codigoPedido" placeholder="4 últimos dígitos" maxlength="4">
    
    <select id="integrador">
        <option value="PedidosYa">PedidosYa</option>
        <option value="Rappi">Rappi</option>
        <option value="UberEats">UberEats</option>
    </select>

    <button id="btnCapturar">GUARDAR EVIDENCIA</button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznSPX3E3-n7kLjy8DffHvW4I2JFRyVpXfue7x9Gs9__I8fgSyIdapSSgaorP1lFybA/exec';
        const video = document.getElementById('video');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } })
            .catch(() => navigator.mediaDevices.getUserMedia({ video: true }))
            .then(stream => { video.srcObject = stream; });

        document.getElementById('btnCapturar').addEventListener('click', async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
            const codigo = document.getElementById('codigoPedido').value;
            const integrador = document.getElementById('integrador').value;

            if(codigo.length < 4) { alert("Ingresa los 4 dígitos"); return; }

            const btn = document.getElementById('btnCapturar');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar el bloqueo del navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: base64Image, filename: codigo + "_" + integrador + ".jpg", integrador: integrador })
                });
                alert('¡Evidencia guardada correctamente!');
                document.getElementById('codigoPedido').value = '';
            } catch (error) {
                alert('Error al guardar. Verifica la conexión.');
            } finally {
                btn.innerText = "GUARDAR EVIDENCIA";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
